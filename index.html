<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da Cobra</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-wrapper">
      <header class="game-header">
        <div class="scoreboard">
          <span class="label">Pontuação:</span>
          <span id="score">0</span>
        </div>
        <button id="play-pause" class="control-btn" aria-label="Reiniciar jogo">
          ⏯
        </button>
      </header>
      <div class="board-container">
        <canvas id="board" width="480" height="480" role="img" aria-label="Tabuleiro do jogo da cobra"></canvas>
        <div class="overlay" id="overlay" hidden>
          <div class="overlay-content">
            <h2 id="overlay-title">Pressione espaço para jogar</h2>
            <p>Use as setas ou WASD para controlar a cobra.</p>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
